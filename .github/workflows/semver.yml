name: Semantic Release

# Runs semantic-release when a maintainer pushes to a release/x.y branch.
# semantic-release analyses commits since the last tag, bumps the version,
# updates CHANGELOG.md, commits it, and pushes a vX.Y.Z tag.
# That tag push then triggers a GitHub release, which triggers publish.yml.
#
# Required secrets: GH_TOKEN (PAT with contents: write)

on:
  push:
    branches:
      - 'release/[0-9]+.x'
      - 'release/[0-9]+.[0-9]+.x'
    paths:
      - '*.go'
      - 'go.mod'
      - '.releaserc.json'
      - '.github/workflows/semver.yml'

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
